{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>{{ title }}</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          {% for column in columns %}
            <th>{{ column }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          {% for column in columns %}
            <td>{{ row[column] }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
